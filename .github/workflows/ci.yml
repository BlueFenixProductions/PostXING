name: CI

on:
  # CI runs only on the gate branches (main, stage), for both push and PR. Develop/feature
  # pushes do NOT trigger it -- run CI on develop manually with `gh workflow run CI --ref develop`
  # (workflow_dispatch) before opening a PR.
  push:
    branches: [main, stage]
  pull_request:
    branches: [main, stage]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # maui-android too: the App multi-targets net10.0-android, so the full-graph build compiles
      # the Android head. The windows-latest runner ships the Android SDK the build needs.
      - name: Install MAUI workloads
        run: dotnet workload install maui-windows maui-android --skip-sign-check

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      # `bun run build` -> scripts/build.ps1: version-stamps, then builds the whole graph
      # (App included). It restores as part of the build (no --no-restore) so the MAUI App's
      # RID-specific win-x64 runtime pack gets pulled (NETSDK1112 otherwise). Bare `bun build`
      # would hit Bun's bundler, so it must be `bun run build`.
      - name: Build
        run: bun run build

      # Reuse the build above with --no-build so the version stamp is preserved and nothing
      # recompiles; coverage + trx args are forwarded to the xunit script after `--`.
      - name: Test
        run: bun run xunit -- --no-build --collect:"XPlat Code Coverage" --logger trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_id }}
          path: '**/TestResults/*.trx'

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, stage, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + Test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        run: dotnet workload install maui-windows --skip-sign-check

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore solution/PostXING4.slnx

      # No --no-restore: the MAUI App builds RID-specific (win-x64), and the
      # solution-level restore above doesn't fetch that runtime pack, so letting
      # the build restore is what pulls it (NETSDK1112 otherwise).
      - name: Build
        run: dotnet build solution/PostXING4.slnx -c Release

      - name: Test
        run: dotnet test solution/PostXING4.slnx -c Release --no-build --collect:"XPlat Code Coverage" --logger "trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: '**/TestResults/*.trx'
